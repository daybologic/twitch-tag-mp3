name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: sudo apt-get install -y id3v2 libmoose-perl libipc-run3-perl libsys-cpu-perl

      - name: Build and test
        run: |
          perl Makefile.PL
          make
